<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="navbar">
            <h2 class="titulo">Sistema <span>Financeiro</span></h2>
            <div class="profile">
                <a href="https://github.com/Elecktry"><img src="./assets/img/profile.svg" alt="" class="svg"></a>
                <h4>Ezequiel <span>Costa</span></h4>
            </div>
        </div>

    </nav>

    <main class="container">

        <h1>💰 Controle Financeiro</h1>

        <section class="resumo">
            <div class="card">
                <h3>Receitas</h3>
                <p id="total-receitas">R$ 0,00</p>
            </div>

            <div class="card">
                <h3>Despesas</h3>
                <p id="total-despesas">R$ 0,00</p>
            </div>

            <div class="card">
                <h3>Saldo</h3>
                <p id="saldo">R$ 0,00</p>
            </div>
        </section>

        <button type="button" id="abrir-modal" class="botao-nova-movimentacao">
            + Nova movimentação
        </button>
        <div id="modal" class="modal">

            <div class="modal-conteudo">

                <div class="modal-cabecalho">
                    <h2>Nova movimentação</h2>

                    <button type="button" id="fechar-modal" class="fechar-modal" aria-label="Fechar modal">
                        &times;
                    </button>
                </div>

                <form class="formulario">

                    <div class="campo">
                        <label for="descricao">Descrição</label>

                        <input type="text" id="descricao" placeholder="Ex.: Salário, aluguel...">
                    </div>

                    <div class="campo">
                        <label for="valor">Valor</label>

                        <input type="number" id="valor" placeholder="Ex.: 1200,00" min="0" step="0.01">
                    </div>

                    <div class="campo">
                        <label for="categoria">Categoria</label>

                        <select id="categoria">
                            <option value="">Selecione uma categoria</option>
                            <option value="alimentacao">Alimentação</option>
                            <option value="transporte">Transporte</option>
                            <option value="moradia">Moradia</option>
                            <option value="lazer">Lazer</option>
                            <option value="trabalho">Trabalho</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>

                    <fieldset class="campo tipo-campo">
                        <legend>Tipo</legend>

                        <div class="tipos">
                            <label>
                                <input type="radio" name="tipo" value="receita" checked>
                                Receita
                            </label>

                            <label>
                                <input type="radio" name="tipo" value="despesa">
                                Despesa
                            </label>
                        </div>
                    </fieldset>

                    <div class="modal-acoes">
                        <button type="button" id="cancelar-modal" class="botao-cancelar">
                            Cancelar
                        </button>

                        <button type="button" onclick="adicionar()" class="botao-adicionar">
                            Adicionar
                        </button>
                    </div>

                </form>

            </div>

        </div>

        <section class="graficos">
            <div class="grafico-card">
                <h2>Despesas por categoria</h2>
                <div class="grafico-container">
                    <canvas id="grafico-categorias"></canvas>
                </div>
            </div>
            <div class="grafico-card">
                <h2>Gastos mensais</h2>

                <div class="grafico-container">
                    <canvas id="grafico-mensal"></canvas>
                </div>
            </div>
        </section>


        <section class="movimentacoes">
            <h2>Movimentações</h2>

            <ul id="lista"></ul>
        </section>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>

</html>
