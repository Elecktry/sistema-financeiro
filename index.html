<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="navbar">
            <h2 class="titulo">Sistema <span>Financeiro</span></h2>
            <div class="profile">
                <img src="./assets/img/profile.svg" alt="" class="svg">
                <h4>Ezequiel <span>Costa</span></h4>
            </div>
        </div>

    </nav>

    <main class="container">

        <h1>💰 Controle Financeiro</h1>

        <section class="resumo">
            <div class="card">
                <h3>Receitas</h3>
                <p id="total-receitas">R$ 0,00</p>
            </div>

            <div class="card">
                <h3>Despesas</h3>
                <p id="total-despesas">R$ 0,00</p>
            </div>

            <div class="card">
                <h3>Saldo</h3>
                <p id="saldo">R$ 0,00</p>
            </div>
        </section>
        
        <form class="formulario">
            <label for="descricao">Descrição</label>
            <input type="text" id="descricao" placeholder="Descrição">

            <label for="valor">Valor</label>
            <input type="number" id="valor" placeholder="Valor">

            <button type="button" onclick="adicionar()">
                Adicionar
            </button>
            <div class="tipos">
                <label>
                    <input type="radio" name="tipo" value="receita" checked>
                    Receita
                </label>

                <label>
                    <input type="radio" name="tipo" value="despesa">
                    Despesa
                </label>
            </div>
        </form>

        <section class="movimentacoes">
            <h2>Movimentações</h2>

            <ul id="lista"></ul>
        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
