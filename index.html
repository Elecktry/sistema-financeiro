<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="navbar">
            <h2 class="titulo">Sistema <span>Financeiro</span></h2>
            <div class="profile">
                <img src="./assets/img/profile.svg" alt="" class="svg">
                <h4>Ezequiel <span>Costa</span></h4>
            </div>
        </div>

    </nav>

    <div class="container">

        <h1>💰 Controle Financeiro</h1>

        <div class="saldo-box">
            <h2>Saldo Atual</h2>
            <p id="saldo">R$ 0,00</p>
        </div>

        <div class="formulario">
            <input
                type="text"
                id="descricao"
                placeholder="Descrição">

            <input
                type="number"
                id="valor"
                placeholder="Valor">

            <button onclick="adicionar()">
                Adicionar
            </button>
        </div>

        <div class="movimentacoes">
            <h2>Movimentações</h2>

            <ul id="lista"></ul>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
